<!DOCTYPE html>
<html lang="en">
<head>

    <title>Map</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="map-nav">
    <input type="text" id="searchbox" placeholder="Search location...">
    <button class="search-btn" onclick="searchLocation()">Search <i class="fa-solid fa-magnifying-glass"></i></button>
    <button class="search-btn" onclick="enableMapSelection()">Select on Map <i class="fa-solid fa-plus"></i></button>
</div>
<div id="placeCard" class="place-card hidden">

    <div class="card-header">
        <img id="placeImage" src="https://via.placeholder.com/400x200">
        <button class="close-btn" onclick="closeCard()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="card-body">
        <small id="placeType">PLACE TYPE</small>
        <h2 id="placeTitle">Place Name</h2>
        <p id="placeDesc">Description will appear here...</p>
        <a id="seeMoreLink" target="_blank">See more...</a>
        <div id="uploadSection" style="display:none; margin-top:10px;">
            <input type="file" id="imageUpload" accept="image/*">
        </div>
        <div class="card-actions">
            <button><i class="fa-solid fa-diamond-turn-right"></i> Directions</button>
            <button><i class="fa-regular fa-floppy-disk"></i> Save</button>
            <button><i class="fa-solid fa-share-nodes"></i> Share</button>
        </div>

        <div class="card-info">
            <p><strong>Address:</strong> <span id="placeAddress"></span></p>

        </div>

        <button class="visit-btn">Visit Website</button>
    </div>

</div>
<div id="addPlace" class="add hidden ">
    <div class="add-content">
        <p>Add a new location to the map</p>

    <div class="add-upload" onclick="triggerUpload()">
        <i class="fa-solid fa-camera"></i>
        <p>Upload Place Photo</p>
        <small>PNG, JPG up to 10MB</small>
        <input type="file" id="placeImageInput" hidden>
    </div>
    <form  method="get">
        <label for="placeName">Place Name:<sup>*</sup></label><br>
        <input type="text" id="placeName"  placeholder="Place Name"><br>
        <label for="placeDescInput">Description:<sup>*</sup></label><br>
        <textarea id="placeDescInput" placeholder="Description"></textarea><br>
        <label for="placeAddressInput">Address:<sup>*</sup></label><br>
        <input type="text" id="placeAddressInput" placeholder="Address">
    </form>
    <div class="map-select-box">
        <p>&#128205;location selected on map</p>

        <div class="modal-action">
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="save-btn" onclick="savePlace()">Save</button>
        </div>
    </div>
</div>

</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
